name: Response Time CI
on:
  repository_dispatch:
    types: [response-time]
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor@master
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
